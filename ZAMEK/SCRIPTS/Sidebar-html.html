<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base target="_top">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f8fafc;
      color: #111827;
      font: 13px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .wrap {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    .header {
      padding: 10px 10px;
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 10px;
      background: #ffffff;
      margin-bottom: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }

    .list {
      list-style: none;
      padding: 0;
      margin: 0;
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    .item {
      padding: 6px 8px;
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 8px;
      margin-bottom: 8px;
      background: #fff;
      word-break: break-word;
    }

    .footer {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 10px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .footerTitle {
      font-weight: 700;
      font-size: 12px;
      color: rgba(17,24,39,0.85);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .cacheRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: rgba(0,0,0,0.75);
    }

    .cacheLabel {
      color: rgba(0,0,0,0.55);
      white-space: nowrap;
    }

    .cacheValue {
      font-weight: 600;
      color: rgba(0,0,0,0.80);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <p id="title" class="title">Aktualizace Projektu</p>
    </div>

    <ul id="list" class="list"></ul>

    <div class="footer" id="cacheFooter">
      <div class="footerTitle">Cache – čas do refresh (min)</div>
      <div class="cacheRow"><span class="cacheLabel">Assets</span><span class="cacheValue" id="cacheAssets">…</span></div>
      <div class="cacheRow"><span class="cacheLabel">Joby</span><span class="cacheValue" id="cacheJobs">…</span></div>
      <div class="cacheRow"><span class="cacheLabel">Blueprinty</span><span class="cacheValue" id="cacheBlueprints">…</span></div>
    </div>
  </div>
<script>
  
  var SHEET_VALUES = {}
  var lastRenderedCount = 0;

  function setText(id, value) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = value || '';
  }

  function extractProjectNumber(heading) {
    var text = String(heading || '');
    // Prefer a trailing digit (e.g. "ALPRO 7"); fall back to last standalone 1-7.
    var m = text.match(/([1-7])\s*$/);
    if (m && m[1]) return m[1];

    var all = text.match(/\b([1-7])\b/g);
    if (all && all.length) {
      return all[all.length - 1];
    }
    return '';
  }

  function appendItem(text) {
    var list = document.getElementById('list');
    var li = document.createElement('li');
    li.className = 'item';
    li.textContent = text;
    list.appendChild(li);
  }

  function isNearBottom(el) {
    // If user scrolled up, don't force auto-scroll.
    var thresholdPx = 24;
    return (el.scrollHeight - el.scrollTop - el.clientHeight) <= thresholdPx;
  }

  function fmtMinutes(ms) {
    if (ms == null || isNaN(ms)) return '…';
    if (ms <= 0) return '0.0';
    var mins = ms / 60000;
    // Show one decimal; keeps it stable and readable.
    return mins.toFixed(1);
  }

  function setCacheLine(id, expiresMs) {
    var el = document.getElementById(id);
    if (!el) return;
    if (!expiresMs) {
      el.textContent = '…';
      return;
    }
    var delta = Number(expiresMs) - Date.now();
    el.textContent = fmtMinutes(delta);
  }

  function render(status) {
    status = status || {};

    var n = extractProjectNumber(status.heading);
    setText('title', n ? ('Aktualizace Projektu ' + n) : 'Aktualizace Projektu');

    var items = Array.isArray(status.items) ? status.items : [];
    var list = document.getElementById('list');
    var shouldStickToBottom = isNearBottom(list);

    // If list was reset on server, do a full re-render.
    if (items.length < lastRenderedCount) {
      list.innerHTML = '';
      lastRenderedCount = 0;
    }

    // Append only new items to avoid flicker.
    for (var i = lastRenderedCount; i < items.length; i++) {
      appendItem(items[i]);
    }
    lastRenderedCount = items.length;

    if (shouldStickToBottom && items.length) {
      list.scrollTop = list.scrollHeight;
    }

    if (String(status.close) === '1') {
      clearInterval(interval);
    }

    // Cache countdown (always visible; updates every poll)
    var ci = status.cacheInfo || {};
    setCacheLine('cacheAssets', ci.assetsExpiresMs);
    setCacheLine('cacheJobs', ci.jobsExpiresMs);
    setCacheLine('cacheBlueprints', ci.blueprintsExpiresMs);
  }

  function drawStatus() {
    google.script.run
      .withSuccessHandler(function (status) {
        SHEET_VALUES = status || {};
        render(SHEET_VALUES);
      })
      .getSidebarData();
  }

  var interval = setInterval(drawStatus, 1000)
  drawStatus(); // initial status

</script>
</body>
</html>
